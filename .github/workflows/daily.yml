name: Daily EMY Automation

on:
  schedule:
    # 01:10 UTC σημαίνει 03:10 π.μ. ώρα Ελλάδος (τον χειμώνα)
    - cron: '10 1 * * *' 
  workflow_dispatch:

jobs:
  run-logic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Tools
      run: pip install selenium pandas openpyxl
    - name: Execute Script
      run: python screenshot.py
    - name: Save Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Full update: All 13 Regions Screenshot and Excel" || echo "No changes"
        git push
