name: Daily EMY Screenshot

on:
  schedule:
    - cron: '0 6 * * *' # Τρέχει στις 08:00 ώρα Ελλάδος (06:00 UTC)
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις και χειροκίνητα για δοκιμή

jobs:
  take-screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run screenshot script
      run: python screenshot.py

    - name: Commit and push screenshot
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add screenshots/
        git commit -m "Auto-save daily screenshot" || echo "No changes to commit"
        git push
